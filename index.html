    <style>
      /* Glass Orb Animation */
      @keyframes breathe {
        0%, 100% { transform: scale(1); box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
        50% { transform: scale(1.02); box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
      }

      /* Sun/Emoji Pulsing & Glow Animation (Bypasses the browser blue border bug) */
      @keyframes pulseSun {
        0% { 
          transform: scale(1); 
          opacity: 0.9; 
          filter: drop-shadow(0 0 15px rgba(255, 228, 107, 0.6)) drop-shadow(0 0 30px rgba(255, 228, 107, 0.35)); 
        }
        100% { 
          transform: scale(1.05); 
          opacity: 1; 
          filter: drop-shadow(0 0 25px rgba(255, 228, 107, 0.8)) drop-shadow(0 0 50px rgba(255, 228, 107, 0.5)); 
        }
      }

      /* Rich Dark Slate-Teal Glass Orb (High Contrast & Professional) */
      .glass-orb {
        position: relative;
        width: 340px;
        max-width: 85vw;
        aspect-ratio: 1 / 1; 
        border-radius: 50%;
        background: rgba(13, 30, 43, 0.65); /* High-contrast slate-teal glass */
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.15); /* Clean glowing edge */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        animation: breathe 4s ease-in-out infinite;
        padding: 2rem;
        box-sizing: border-box;
        z-index: 10;
      }

      .progress-ring {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
        pointer-events: none;
      }

      /* EXACT SKY & DYNAMIC SUN */
      .loader-sky {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #5ba4ff 0%, #70f0df 100%);
        z-index: 1;
      }

      .loader-sun {
        position: absolute;
        top: 8%; 
        right: 3%; 
        width: clamp(90px, 16vw, 125px); 
        height: clamp(90px, 16vw, 125px);
        border-radius: 50%;
        border: none !important;
        outline: none !important;
        background: transparent !important;
        z-index: 2;
        animation: pulseSun 4s infinite alternate ease-in-out;
        object-fit: cover;
      }

      /* EXACT TERRAIN LAYOUT & SCALING */
      .terrain-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 256px; 
        z-index: 3;
        pointer-events: none;
        overflow: hidden;
      }

      .terrain-back {
        position: absolute;
        bottom: 0;
        width: 120%; 
        left: -40px; 
        height: 224px; 
      }
      
      .terrain-front {
        position: absolute;
        bottom: 0;
        width: 120%; 
        right: -40px; 
        height: 128px; 
      }

      /* Responsive adjustment for Mobile */
      @media (max-width: 640px) {
        .loader-sun {
          top: 10%;
          right: 10%;
        }
        .terrain-container {
          height: 180px; 
        }
        .terrain-back {
          left: -20px;
          height: 155px; 
        }
        .terrain-front {
          right: -20px;
          height: 90px;

    <!-- LOADING SCREEN LOGIC & SETTINGS -->
    <script>
      (function() {
        // ==========================================
        // ⚙️ LOADER SETTINGS (TUNE THESE TO YOUR LIKING)
        // ==========================================
        const TICK_SPEED_MS = 450;       // Decreased tick rate (slower load)
        const JUMP_MIN = 2;              // Smaller minimum jump size
        const JUMP_MAX = 5;              // Smaller maximum jump size
        const HOLD_TIME_MS = 1000;       
        const FADE_OUT_SPEED_MS = 700;   
        // ==========================================

        const progressCircle = document.getElementById('loader-ring-progress');
        const loaderScreen = document.getElementById('custom-loader-screen');
        
        const CIRCUMFERENCE = 295; 
        let currentPercent = 0;
        
        loaderScreen.style.transition = `opacity ${FADE_OUT_SPEED_MS}ms ease-out, visibility ${FADE_OUT_SPEED_MS}ms`;

        // Start incrementing the progress ring
        const progressInterval = setInterval(() => {
          currentPercent += Math.floor(Math.random() * (JUMP_MAX - JUMP_MIN + 1)) + JUMP_MIN;
          if (currentPercent > 96) currentPercent = 96;
          
          const offset = CIRCUMFERENCE - (currentPercent / 100) * CIRCUMFERENCE;
          progressCircle.style.strokeDashoffset = offset;
        }, TICK_SPEED_MS); 

        // Failsafe: Function to execute once the page is fully loaded
        function hideLoader() {
          clearInterval(progressInterval);
          progressCircle.style.strokeDashoffset = 0;
          
          setTimeout(() => {
            loaderScreen.style.opacity = '0';
            loaderScreen.style.visibility = 'hidden';
            
            setTimeout(() => {
              loaderScreen.remove();
            }, FADE_OUT_SPEED_MS);
          }, HOLD_TIME_MS); 
        }

        // Check if the page is already fully loaded (e.g., from cache)
        if (document.readyState === 'complete') {
          hideLoader();
        } else {
          // Otherwise, wait for the window load event
          window.addEventListener('load', hideLoader);
        }
      })();
    </script>
