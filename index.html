<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./exam.png" />
    <link rel="manifest" href="./manifest.json" />

    <link rel="apple-touch-icon" href="./exam.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marks & CGPA Calculator</title>
    <script type="module" crossorigin src="./assets/index-DgL7R6mx.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-ob4JiF6B.css">
  </head>
  <body style="margin: 0; padding: 0; background-color: #0b0f19;">

    <div id="custom-loader-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: #0b0f19; 
      display: flex;
      flex-direction: column;
      justify-content: center; /* Vertically Centers Everything */
      align-items: center;     /* Horizontally Centers Everything */
      z-index: 999999;
      padding: 24px;
      box-sizing: border-box;
      transition: opacity 0.6s ease-out, visibility 0.6s;
    ">
      
      <div style="
        width: 100%;
        max-width: 480px; /* Made slightly wider to fit bigger layout elements */
        text-align: center;
      ">
        
        <h2 style="
          color: #ffffff; 
          font-family: system-ui, -apple-system, sans-serif; 
          font-size: 2.0rem; 
          font-weight: 700;
          margin: 0 0 12px 0;
          letter-spacing: -0.025em;
          line-height: 1.3;
        ">
          Tahsin Sarker, ME-23, MIST
        </h2>

        <p style="
          color: #9ca3af; 
          font-family: system-ui, -apple-system, sans-serif; 
          font-size: 1.4rem; 
          margin: 0 0 36px 0;
          line-height: 1.6;
        ">
Marks & CGPA Calculator
        </p>

        <div style="
          width: 100%;
          height: 12px;
          background-color: #1f2937;
          border-radius: 9999px;
          overflow: hidden;
          position: relative;
          box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        ">
          <div id="loader-progress-bar" style="
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #3b82f6, #06b6d4); 
            border-radius: 9999px;
            box-shadow: 0 0 16px rgba(6, 182, 212, 0.6);
            transition: width 0.4s ease-out;
          "></div>
        </div>

      </div>
    </div>
    <div id="root"></div>

    <script>
      (function() {
        const progressBar = document.getElementById('loader-progress-bar');
        const loaderScreen = document.getElementById('custom-loader-screen');
        
        let currentPercent = 0;
        
        const progressInterval = setInterval(() => {
          if (currentPercent < 75) {
            // Tweak 1: Controlled early progression jump sizing
            currentPercent += Math.floor(Math.random() * 3) + 1; 
          } else if (currentPercent < 96) {
            // Tweak 2: Tightened end progression jump sizing
            currentPercent += Math.floor(Math.random() * 2) + 1;
          }
          
          if (currentPercent > 96) currentPercent = 96;
          
          progressBar.style.width = currentPercent + '%';
        }, 480); // Tweak 3: Time delay between ticks (in milliseconds)

        window.addEventListener('load', function () {
          clearInterval(progressInterval);
          
          progressBar.style.width = '100%';
          
          // Tweak 4: Post-load screen display freeze hold
          setTimeout(() => {
            loaderScreen.style.opacity = '0';
            loaderScreen.style.visibility = 'hidden';
            
            setTimeout(() => {
              loaderScreen.remove();
            }, 600);
          }, 900); // 0.6 second hold so people can comfortably finish reading the text
        });
      })();
    </script>
  </body>
</html>
